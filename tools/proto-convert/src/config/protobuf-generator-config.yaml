generatorName: protobuf-schema
outputDir: protos/generated
inputSpec: build/processed-opensearch-openapi.yaml
templateDir: tools/proto-convert/src/config/protobuf-schema-template/
additionalProperties:
  packageName: org.opensearch.protobufs
  addJsonNameAnnotation: false
  flattenComplexType: true
  numberedFieldNumberList: true
  startEnumsWithUnspecified: true
  aggregateModelsName: aggregated_models
  supportMultipleResponses: false
inlineSchemaOptions:
  RESOLVE_INLINE_ENUMS: true
  SKIP_SCHEMA_REUSE: true
typeMappings:
  object: "ObjectMap"
  AnyType: "ObjectMap"
  number: "GeneralNumber"
  bytes: "bytes"
  NullValue: "NullValue"
  double: "double"
  float: "float"
  int32: "int32"
  int64: "int64"
  uint32: "uint32"
  uint64: "uint64"
  sint32: "sint32"
  sint64: "sint64"
  fixed32: "fixed32"
  fixed64: "fixed64"
  sfixed32: "sfixed32"
  sfixed64: "sfixed64"
  bool: "bool"
  string: "string"
openapiGeneratorIgnoreList:
  - "README.md"
